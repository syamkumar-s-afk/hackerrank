<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Blink Light</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 20px;
    }

    .camera-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 200, 255, 0.15);
      border: 2px solid #1e1e1e;
    }

    video {
      display: block;
      width: 640px;
      max-width: 95vw;
      height: auto;
      border-radius: 14px;
      background: #111;
    }

    /* Blinking light overlay */
    .blink-overlay {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 49% {
        background: rgba(255, 255, 255, 0.0);
        box-shadow: inset 0 0 0px transparent;
      }
      50%, 100% {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 80px rgba(255, 230, 100, 0.25);
      }
    }

    /* LED indicator in corner */
    .led {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ff4444, #aa0000);
      box-shadow: 0 0 8px #ff0000, 0 0 20px #ff000066;
      animation: led-blink 1s step-start infinite;
    }

    @keyframes led-blink {
      0%, 49% {
        opacity: 0.15;
        box-shadow: none;
      }
      50%, 100% {
        opacity: 1;
        box-shadow: 0 0 10px #ff4444, 0 0 30px #ff000099;
      }
    }

    /* Controls */
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    label {
      color: #999;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 160px;
      height: 4px;
      background: #333;
      border-radius: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00c8ff;
      cursor: pointer;
      box-shadow: 0 0 6px #00c8ff88;
    }

    .speed-label {
      color: #00c8ff;
      font-size: 0.85rem;
      min-width: 40px;
    }

    button {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #eee;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    button:hover {
      background: #252525;
      border-color: #00c8ff55;
      color: #00c8ff;
    }

    .no-cam {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 640px;
      max-width: 95vw;
      height: 360px;
      background: #111;
      border-radius: 14px;
      color: #555;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <h1>📷 Camera · Blink Light</h1>

  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" autoplay playsinline muted></video>
    <div class="blink-overlay" id="blinkOverlay"></div>
    <div class="led" id="led"></div>
  </div>

  <div class="controls">
    <label>SPEED</label>
    <input type="range" id="speedSlider" min="100" max="2000" value="1000" step="50" />
    <span class="speed-label" id="speedDisplay">1.0s</span>
    <button id="toggleBtn">⏸ Pause</button>
    <button id="colorBtn">🎨 Color</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('blinkOverlay');
    const led = document.getElementById('led');
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplay = document.getElementById('speedDisplay');
    const toggleBtn = document.getElementById('toggleBtn');
    const colorBtn = document.getElementById('colorBtn');

    // Colors for cycling
    const colors = [
      ['rgba(255,255,255,0.08)', 'rgba(255,230,100,0.25)', '#ff4444', '#aa0000', '#ff0000'],
      ['rgba(0,200,255,0.08)',   'rgba(0,200,255,0.3)',    '#00c8ff', '#0066aa', '#00c8ff'],
      ['rgba(0,255,120,0.08)',   'rgba(0,255,120,0.25)',   '#00ff88', '#007744', '#00ff88'],
      ['rgba(200,0,255,0.08)',   'rgba(200,0,255,0.3)',    '#cc00ff', '#6600aa', '#cc00ff'],
      ['rgba(255,100,0,0.08)',   'rgba(255,130,0,0.3)',    '#ff6600', '#aa3300', '#ff6600'],
    ];

    let colorIndex = 0;
    let paused = false;
    let blinkInterval = null;
    let isOn = false;

    // Start webcam
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
      } catch (err) {
        const wrapper = document.getElementById('cameraWrapper');
        wrapper.innerHTML = `<div class="no-cam">⚠️ Camera permission denied or not found</div>`;
        console.error('Camera error:', err);
      }
    }

    function applyColor(c) {
      const [bg, shadow, ledBg, ledBg2, ledGlow] = c;
      const style = document.createElement('style');
      style.id = 'dynamic-styles';
      const existing = document.getElementById('dynamic-styles');
      if (existing) existing.remove();
      style.textContent = `
        @keyframes blink {
          0%, 49%  { background: rgba(0,0,0,0); box-shadow: none; }
          50%, 100% { background: ${bg}; box-shadow: inset 0 0 80px ${shadow}; }
        }
        @keyframes led-blink {
          0%, 49%  { opacity: 0.15; box-shadow: none; background: radial-gradient(circle at 40% 35%, ${ledBg}, ${ledBg2}); }
          50%, 100% { opacity: 1; box-shadow: 0 0 10px ${ledBg}, 0 0 30px ${ledGlow}99; background: radial-gradient(circle at 40% 35%, ${ledBg}, ${ledBg2}); }
        }
      `;
      document.head.appendChild(style);
    }

    function setAnimationDuration(ms) {
      const dur = ms / 1000;
      overlay.style.animationDuration = dur + 's';
      led.style.animationDuration = dur + 's';
    }

    speedSlider.addEventListener('input', () => {
      const ms = parseInt(speedSlider.value);
      speedDisplay.textContent = (ms / 1000).toFixed(1) + 's';
      setAnimationDuration(ms);
    });

    toggleBtn.addEventListener('click', () => {
      paused = !paused;
      if (paused) {
        overlay.style.animationPlayState = 'paused';
        led.style.animationPlayState = 'paused';
        toggleBtn.textContent = '▶ Resume';
      } else {
        overlay.style.animationPlayState = 'running';
        led.style.animationPlayState = 'running';
        toggleBtn.textContent = '⏸ Pause';
      }
    });

    colorBtn.addEventListener('click', () => {
      colorIndex = (colorIndex + 1) % colors.length;
      applyColor(colors[colorIndex]);
    });

    // Init
    startCamera();
    applyColor(colors[0]);
    setAnimationDuration(1000);
  </script>
</body>
</html>
